<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Buzzi Messenger - Ultimate Edition</title>
    <style>
        body { background-color: #729fcf; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .msn-window { background: #fff; border: 1px solid #4b73a3; width: 650px; height: 600px; display: flex; flex-direction: column; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .header { background: linear-gradient(to right, #4b73a3, #729fcf); color: white; padding: 5px 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .chat-container { flex: 3; display: flex; flex-direction: column; border-right: 1px solid #ccc; }
        #messages { flex: 1; padding: 10px; overflow-y: scroll; background: #fff; font-size: 0.9rem; }
        .sidebar { flex: 1; background: #eef2f7; padding: 10px; font-size: 0.8rem; overflow-y: auto; }
        .toolbar { padding: 5px; background: #f0f0f0; border-top: 1px solid #ccc; display: flex; gap: 5px; flex-wrap: wrap; }
        .input-area { padding: 10px; background: #fff; border-top: 1px solid #ccc; }
        
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #75d475; }
        .bezig { background-color: #ff5555; }
        .afwezig { background-color: #ffcc00; }
        .pm-text { font-size: 0.7rem; color: #666; font-style: italic; }

        @keyframes shake { 0% { transform: translate(10px, 10px); } 25% { transform: translate(-10px, -10px); } 50% { transform: translate(10px, -10px); } 75% { transform: translate(-10px, 10px); } 100% { transform: translate(0, 0); } }
        .buzz-effect { animation: shake 0.5s infinite; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .window-box { background: white; padding: 25px; border: 2px outset #ccc; width: 350px; text-align: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="window-box">
            <h3>Buzzi Messenger</h3>
            <input type="text" id="login-user" placeholder="Naam..."><br><br>
            <input type="text" id="login-pm" placeholder="Persoonlijk bericht..."><br><br>
            <label>Tekstkleur:</label> <input type="color" id="login-color" value="#000000"><br><br>
            <button onclick="startApp()">Aanmelden</button>
        </div>
    </div>

    <div class="msn-window" id="app" style="display:none;">
        <div class="header"><span>Buzzi Messenger</span><span>X</span></div>
        <div class="main-content">
            <div class="chat-container">
                <div id="messages"></div>
                <div id="typing" style="font-size: 0.7rem; color: #555; padding: 2px 10px; height:15px; font-style: italic;"></div>
                <div class="toolbar">
                    <button onclick="buzz()" id="buzzBtn">Buzz!</button>
                </div>
                <div class="input-area">
                    <input type="text" id="msgInput" style="width: 100%;" placeholder="Typ bericht...">
                    <button onclick="sendMessage()" style="width: 100%; margin-top:5px;">Verzenden</button>
                </div>
            </div>
            <div class="sidebar" id="user-list"><strong>Contacten:</strong></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/config.js"></script>
    <script>
        const socket = (function(){
            const url = (typeof window !== 'undefined' && window.SOCKET_URL) || undefined;
            return url ? io(url) : io();
        })();
        let userColor = '#000000';
        let canBuzz = true;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, duration, type = 'sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startApp() {
            const user = document.getElementById('login-user').value;
            const pm = document.getElementById('login-pm').value;
            userColor = document.getElementById('login-color').value;
            if(user) {
                audioCtx.resume();
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                socket.emit('login', { username: user, pm: pm, color: userColor });
            }
        }

        function buzz() { 
            if(!canBuzz) return;
            socket.emit('buzz'); 
            canBuzz = false; 
            setTimeout(() => canBuzz = true, 5000);
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if(input.value.trim()) { 
                socket.emit('chat message', { text: input.value, color: userColor }); 
                input.value = ''; 
            }
        }

        document.getElementById('msgInput').addEventListener('keypress', () => socket.emit('typing'));

        socket.on('user-typing', (user) => {
            document.getElementById('typing').textContent = `${user} is aan het typen...`;
            clearTimeout(window.typingTimer);
            window.typingTimer = setTimeout(() => document.getElementById('typing').textContent = '', 2000);
        });

        socket.on('incoming-buzz', () => {
            const app = document.getElementById('app');
            app.classList.add('buzz-effect');
            playTone(110, 0.5, 'square');
            setTimeout(() => app.classList.remove('buzz-effect'), 1000);
        });

        socket.on('chat message', (msg) => {
            const div = document.createElement('div');
            div.innerHTML = `<b style="color: ${msg.color || '#000'}">${msg.username}:</b> ${msg.text}`;
            document.getElementById('messages').appendChild(div);
            playTone(880, 0.2);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        socket.on('update-user-list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = "<strong>Online:</strong><br>";
            users.forEach(u => {
                const statusClass = u.status === 'Bezig' ? 'bezig' : (u.status === 'Afwezig' ? 'afwezig' : 'online');
                list.innerHTML += `<div><span class="status-dot ${statusClass}"></span><strong style="color:${u.color}">${u.username}</strong><br><span class="pm-text">${u.pm}</span></div><hr>`;
            });
            list.innerHTML += `<select onchange="socket.emit('update-status', this.value)">
                <option value="Online">Online</option><option value="Bezig">Bezig</option><option value="Afwezig">Afwezig</option>
            </select>`;
        });
    </script>
</body>
</html>
